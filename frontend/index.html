<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Cloud Full Stack App</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f6f9; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #0078d4; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #005a9e; }
        #status { margin-top: 20px; padding: 10px; border-radius: 6px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="card">
    <h2>Upload to Azure Cloud</h2>
    <form id="uploadForm">
        <div class="form-group">
            <label for="title">Item Title / Description</label>
            <input type="text" id="title" placeholder="e.g., Summer Vacation Photo" required>
        </div>
        <div class="form-group">
            <label for="image">Choose Image</label>
            <input type="file" id="image" accept="image/*" required>
        </div>
        <button type="submit" id="submitBtn">Upload to Azure</button>
    </form>

    <div id="status"></div>
</div>

<script>
    // LOCAL TESTING URL: Use 'http://localhost:5000/api/upload'
    // PRODUCTION AZURE URL: Replace with your actual live Azure API URL once deployed
    const API_URL = 'https://your-azure-backend-app.azurewebsites.net/api/upload';

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');
        const title = document.getElementById('title').value;
        const imageFile = document.getElementById('image').files[0];

        // Prepare multi-part form data containing both variables and files
        const formData = new FormData();
        formData.append('title', title);
        formData.append('image', imageFile);

        submitBtn.innerText = 'Uploading to Cloud...';
        submitBtn.disabled = true;
        statusDiv.style.display = 'none';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `<strong>Success!</strong> Saved to Database.<br><a href="${result.url}" target="_blank">View Live Cloud Image</a>`;
            } else {
                statusDiv.className = 'status error';
                statusDiv.innerText = `Error: ${result.error}`;
            }
        } catch (err) {
            statusDiv.className = 'status error';
            statusDiv.innerText = 'Could not connect to the server backend.';
        } finally {
            submitBtn.innerText = 'Upload to Azure';
            submitBtn.disabled = false;
            statusDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
